services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data/vault:/data/vault
      - wiki-db:/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/wiki.db
      - VAULT_PATH=/data/vault
      - WORKER_POLL_INTERVAL_MS=2000
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/pages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  wiki-db:
